<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Registro</title>

    <link rel="stylesheet" href="./register.css">

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>
<body>

    <main class="container">

        <section class="register-card">

            <h1>Registro</h1>

            <form id="register-form">

                <input
                    type="text"
                    id="name"
                    placeholder="Nome"
                    required
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    required
                >

                <input
                    type="text"
                    id="phone"
                    placeholder="Telefone"
                    required
                >

                <input
                    type="text"
                    id="cpf"
                    placeholder="CPF"
                    required
                >

                <input
                    type="date"
                    id="birth-date"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Senha"
                    required
                >

                <input
                    type="password"
                    id="password-confirmation"
                    placeholder="Confirmar senha"
                    required
                >

                <button type="submit">
                    Registrar
                </button>

            </form>

            <p>
                Já possui conta?
                <a href="../loginPage/login.html">
                    Login
                </a>
            </p>

        </section>

    </main>

    <script type="module" src="./register.js"></script>

</body>
</html>
